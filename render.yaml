services:
  - type: web
    name: sistema-turnos-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-turnos-db
          property: connectionString
      - key: CHATBOT_DB_URL
        fromDatabase:
          name: sistema-turnos-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: sistema-turnos-db
    plan: free
